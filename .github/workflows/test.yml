name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  cpow-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install API dependencies
        run: pip install -r requirements-api.txt
      - name: Run verify
        run: bash scripts/verify.sh
