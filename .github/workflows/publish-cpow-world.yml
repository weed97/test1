name: Publish CPoW World

# test1/main 의 cpow_* 트리만 export → weed97/cpow_world 로 push
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout test1 main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          persist-credentials: false

      - name: Validate push token
        env:
          PUSH_TOKEN: ${{ secrets.CPOW_WORLD_PUSH_TOKEN }}
        run: |
          if [ -z "$PUSH_TOKEN" ]; then
            echo "::error::CPOW_WORLD_PUSH_TOKEN secret is not set on weed97/test1."
            echo "See docs/SYNC_CPOW_WORLD.md"
            exit 1
          fi
          CODE=$(curl -s -o /tmp/repo_check.json -w "%{http_code}" \
            -H "Authorization: Bearer ${PUSH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/weed97/cpow_world")
          if [ "$CODE" != "200" ]; then
            echo "::error::Token cannot access weed97/cpow_world (HTTP ${CODE})."
            cat /tmp/repo_check.json || true
            exit 1
          fi
          if ! git ls-remote "https://x-access-token:${PUSH_TOKEN}@github.com/weed97/cpow_world.git" HEAD >/dev/null 2>&1; then
            echo "::error::Token cannot push to cpow_world. Check Contents write."
            exit 1
          fi
          echo "Token OK."

      - name: Build cpow_world export from main
        run: bash scripts/export_cpow_world.sh /tmp/cpow_world_export

      - name: Push to weed97/cpow_world
        env:
          PUSH_TOKEN: ${{ secrets.CPOW_WORLD_PUSH_TOKEN }}
          SOURCE_SHA: ${{ github.sha }}
        run: |
          cd /tmp/cpow_world_export
          git init -q
          git config user.name "weed97"
          git config user.email "weed97@users.noreply.github.com"
          git add -A
          git commit -m "Sync from test1/main (${SOURCE_SHA:0:7})"
          git branch -M main
          git remote add origin "https://x-access-token:${PUSH_TOKEN}@github.com/weed97/cpow_world.git"
          git push -u origin main --force
